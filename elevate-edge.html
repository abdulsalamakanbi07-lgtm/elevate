const { useState, useEffect, useRef, useCallback } = React;

/* ---------------- Shared hook: scroll reveal ---------------- */
function useReveal() {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setInView(true); io.unobserve(el); }
    }, { threshold: 0.15 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return [ref, inView];
}

function Reveal({ children, delay = 0, className = "", as: Tag = "div" }) {
  const [ref, inView] = useReveal();
  const delayClass = delay ? `reveal-delay-${delay}` : "";
  return (
    <Tag ref={ref} className={`reveal ${inView ? "in-view" : ""} ${delayClass} ${className}`}>
      {children}
    </Tag>
  );
}

/* ---------------- Animated counter ---------------- */
function Counter({ target, suffix = "", isFloat = false }) {
  const ref = useRef(null);
  const [value, setValue] = useState(0);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([entry]) => {
      if (!entry.isIntersecting) return;
      const duration = 1800;
      const start = performance.now();
      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const v = target * eased;
        setValue(isFloat ? v.toFixed(1) : Math.floor(v));
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
      io.unobserve(el);
    }, { threshold: 0.5 });
    io.observe(el);
    return () => io.disconnect();
  }, [target, isFloat]);
  return <span ref={ref}>{value}{suffix}</span>;
}

    if (!track) return;
    const card = track.querySelector('.testimonial-card');
    const gap = 24;
    const distance = (card?.offsetWidth || 320) + gap;
    track.scrollBy({ left: dir * distance, behavior: 'smooth' });
  };

  return (
    <section className="py-28 bg-[var(--bg-alt)]">
      <div className="max-w-7xl mx-auto px-6 lg:px-10">
        <Reveal className="flex items-end justify-between flex-wrap gap-6">
          <div>
            <p className="eyebrow">Testimonials</p>
            <h2 className="font-display text-4xl sm:text-5xl font-semibold mt-5">Kind words from clients.</h2>
          </div>
          <div className="flex gap-3">
            <button onClick={() => scrollByCard(-1)} aria-label="Previous testimonial" className="w-11 h-11 rounded-full border border-[var(--line)] flex items-center justify-center hover:border-[var(--orange)] transition-colors">
              <Icon.chevLeft className="w-4 h-4" />
            </button>
            <button onClick={() => scrollByCard(1)} aria-label="Next testimonial" className="w-11 h-11 rounded-full border border-[var(--line)] flex items-center justify-center hover:border-[var(--orange)] transition-colors">
              <Icon.chevRight className="w-4 h-4" />
            </button>
          </div>
        </Reveal>

        <div ref={trackRef} className="testimonial-track flex gap-6 mt-12 overflow-x-auto pb-4 -mx-6 px-6 lg:mx-0 lg:px-0">
          {list.map((t, idx) => (
            <Reveal key={t.name} delay={idx + 1} className="testimonial-card card p-8 min-w-[320px] sm:min-w-[380px]">
              <div className="flex items-center gap-4 mb-5">
                <Avatar seed={t.seed} alt={t.name} />
                <div>
                  <p className="font-semibold">{t.name}</p>
                  <p className="text-xs text-[var(--text-muted)]">{t.role}</p>
                </div>
              </div>
              <p className="text-[var(--text-muted)] leading-relaxed">{t.quote}</p>
            </Reveal>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ================= CONTACT ================= */
function Contact() {
  const [form, setForm] = useState({ name: '', email: '', subject: '', message: '' });
  const [status, setStatus] = useState(null);

  const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

  const handleSubmit = (e) => {
    e.preventDefault();
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email);
    if (!form.name.trim() || !emailOk || !form.message.trim()) {
      setStatus({ ok: false, msg: 'Please fill in your name, a valid email, and a message.' });
      return;
    }
    setStatus({ ok: true, msg: `Thanks, ${form.name.split(' ')[0]} — your message is ready to send. Connect a form backend (e.g. Formspree) to deliver it to your inbox.` });
    setForm({ name: '', email: '', subject: '', message: '' });
  };

  return (
    <section id="contact" className="py-28 bg-[var(--bg-alt)]">
      <div className="max-w-7xl mx-auto px-6 lg:px-10 grid lg:grid-cols-5 gap-12">
        <Reveal className="lg:col-span-2">
          <p className="eyebrow">Contact</p>
          <h2 className="font-display text-4xl font-semibold mt-5 leading-tight">Let's build something worth launching.</h2>
          <p className="mt-5 text-[var(--text-muted)]">Tell us about the project — we usually reply within one business day.</p>

          <div className="mt-9 space-y-5">
            <a href="mailto:hello@elevateedge.dev" className="flex items-center gap-4 group">
              <span className="w-11 h-11 rounded-full bg-white border border-[var(--line)] flex items-center justify-center group-hover:border-[var(--orange)] transition-colors shrink-0"><Icon.mail className="w-[18px] h-[18px]" /></span>
              <span>hello@elevateedge.dev</span>
            </a>
            <a href="tel:+15551234567" className="flex items-center gap-4 group">
              <span className="w-11 h-11 rounded-full bg-white border border-[var(--line)] flex items-center justify-center group-hover:border-[var(--orange)] transition-colors shrink-0"><Icon.call className="w-[18px] h-[18px]" /></span>
              <span>+1 (555) 123-4567</span>
            </a>
            <a href="#" className="flex items-center gap-4 group">
              <span className="w-11 h-11 rounded-full bg-white border border-[var(--line)] flex items-center justify-center group-hover:border-[var(--orange)] transition-colors shrink-0"><Icon.whatsapp className="w-[18px] h-[18px]" /></span>
              <span>WhatsApp — chat with us</span>
            </a>
            <div className="flex items-center gap-4">
              <span className="w-11 h-11 rounded-full bg-white border border-[var(--line)] flex items-center justify-center shrink-0"><Icon.pin className="w-[18px] h-[18px]" /></span>
              <span>Remote — working across time zones</span>
            </div>
          </div>

          <div className="flex gap-3 mt-9">
            <SocialIcon label="LinkedIn"><Icon.linkedin className="w-4 h-4" /></SocialIcon>
            <SocialIcon label="GitHub"><Icon.github className="w-4 h-4" /></SocialIcon>
          </div>
        </Reveal>

        <Reveal delay={1} className="lg:col-span-3">
          <form onSubmit={handleSubmit} className="card p-8 grid sm:grid-cols-2 gap-5">
            <div className="sm:col-span-1">
              <label htmlFor="name" className="text-sm font-medium mb-2 block">Name</label>
              <input id="name" name="name" type="text" className="field" placeholder="Your full name" value={form.name} onChange={handleChange} required />
            </div>
            <div className="sm:col-span-1">
              <label htmlFor="email" className="text-sm font-medium mb-2 block">Email</label>
              <input id="email" name="email" type="email" className="field" placeholder="you@company.com" value={form.email} onChange={handleChange} required />
            </div>
            <div className="sm:col-span-2">
              <label htmlFor="subject" className="text-sm font-medium mb-2 block">Subject</label>
              <input id="subject" name="subject" type="text" className="field" placeholder="What's this about?" value={form.subject} onChange={handleChange} />
            </div>
            <div className="sm:col-span-2">
              <label htmlFor="message" className="text-sm font-medium mb-2 block">Message</label>
              <textarea id="message" name="message" rows="5" className="field" placeholder="Tell us about your project..." value={form.message} onChange={handleChange} required></textarea>
            </div>
            <div className="sm:col-span-2">
              <button type="submit" className="btn btn-primary w-full sm:w-auto">Send Message</button>
              {status && <p className={"text-sm mt-3" + (status.ok ? " text-[var(--orange)]" : " text-red-500")}>{status.msg}</p>}
            </div>
          </form>

          <div className="card mt-6 overflow-hidden">
            <iframe title="Map location" className="w-full h-64 grayscale hover:grayscale-0 transition-all duration-500" loading="lazy"
              src="https://www.google.com/maps?q=San%20Francisco%2C%20CA&output=embed"></iframe>
          </div>
        </Reveal>
      </div>
    </section>
  );
}

function App() {
  const [dark, setDark] = useState(() => {
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  });

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  return (
    <React.Fragment>
      <Navbar dark={dark} onToggleTheme={() => setDark(d => !d)} />
      <Hero />
      <About />
      <Services />
      <WhyChooseUs />
      <Portfolio />
      <Skills />
      <Stats />
      <Testimonials />
      <Process />
      <Contact />

  );
}

try {
